stages:
  - build
  - test
  - security
  - deploy
  - inference

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH'
      when: always
    - when: never

variables:
  IMAGE_TAG: "$CI_COMMIT_SHA"

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# =====================
# BUILD (Docker build & push)
# =====================
.build-template:
  stage: build
  before_script:
    - docker info
    - test -n "$DOCKERHUB_USERNAME" || { echo "DOCKERHUB_USERNAME missing"; exit 1; }
    - test -n "$DOCKERHUB_TOKEN" || { echo "DOCKERHUB_TOKEN missing"; exit 1; }
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build-backend:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA" -f backend/Dockerfile backend
    - docker push "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml

build-web:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA" -f infra/nginx/Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - infra/nginx/**/*
        - .gitlab-ci.yml

build-execution:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA" -f execution/Dockerfile execution
    - docker push "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - execution/**/*
        - .gitlab-ci.yml

build-feedback:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/feedback:$CI_COMMIT_SHA" -f feedback/Dockerfile feedback
    - docker push "$DOCKERHUB_USERNAME/feedback:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - feedback/**/*
        - .gitlab-ci.yml

# =====================
# TEST
# =====================
test:
  stage: test
  tags: [ec2-mono]
  script:
    - echo "Running tests"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|infra|fix)\//'

# =====================
# SECURITY (Trivy FS)
# =====================
cache:
  key: trivy-cache
  paths:
    - .trivycache/

trivy_fs:
  stage: security
  tags: [ec2-mono]
  script:
    - trivy fs --severity HIGH,CRITICAL .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'

# =====================
# DEPLOY (SSH → server scripts)
# =====================
.deploy-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

deploy-foundation-dev:
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_foundation.sh"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - docker-compose.db.yml
        - docker-compose.exec.yml
        - docker-compose.feedback.yml
        - scripts/deploy_foundation.sh
        - scripts/healthcheck.sh
        - execution/**/*
        - feedback/**/*
        - .gitlab-ci.yml
  needs:
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true

deploy-foundation-prod:
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_foundation.sh"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      changes:
        - docker-compose.db.yml
        - docker-compose.exec.yml
        - docker-compose.feedback.yml
        - scripts/deploy_foundation.sh
        - scripts/healthcheck.sh
        - execution/**/*
        - feedback/**/*
        - .gitlab-ci.yml
  needs:
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true

# 기존 server deploy
deploy-dev:
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# =====================
# INFERENCE (Elice sparse checkout)
# =====================
inference-deploy:
  stage: inference
  tags: [elice-container]
  variables:
    GIT_STRATEGY: "none"
    INF_DIR: "inference"
    DEPLOY_DIR: "/srv/app/app/inference"
    MODEL_DIR: "/home/elicer/models"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - inference/**
        - .gitlab-ci.yml
  script: |-
    set -euo pipefail
    echo "Deploying inference service"

    rm -rf repo
    mkdir repo
    cd repo

    git init
    git remote add origin "$CI_REPOSITORY_URL"
    git fetch --depth 1 origin "$CI_COMMIT_SHA"
    git sparse-checkout init --cone
    git sparse-checkout set "$INF_DIR"
    git checkout -f FETCH_HEAD

    mkdir -p "$DEPLOY_DIR"
    rsync -a "$INF_DIR/" "$DEPLOY_DIR/"

    cd "$DEPLOY_DIR"
    export PYENV_ROOT="$HOME/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    pyenv activate venv
    pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cu128

    unzip -oq "$MODEL_DIR/label_model.zip" -d "$DEPLOY_DIR/models/label_model"
    unzip -oq "$MODEL_DIR/text_model.zip"  -d "$DEPLOY_DIR/models/text_model"
