# 개발단계 임시 패스
trivy_scan_images:
  stage: security
  tags: [ec2-mono]
  needs: ["build-backend", "build-web", "build-execution", "build-feedback"]
  variables:
    TRIVY_SEVERITY: "CRITICAL,HIGH"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        TRIVY_EXIT_CODE: "0"   # 발견돼도 통과
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      variables:
        TRIVY_EXIT_CODE: "1"   # 운영은 차단
  script:
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code $TRIVY_EXIT_CODE ${DOCKERHUB_USERNAME}/backend:${CI_COMMIT_SHA}
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code $TRIVY_EXIT_CODE ${DOCKERHUB_USERNAME}/web:${CI_COMMIT_SHA}
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code $TRIVY_EXIT_CODE ${DOCKERHUB_USERNAME}/execution:${CI_COMMIT_SHA}
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code $TRIVY_EXIT_CODE ${DOCKERHUB_USERNAME}/feedback:${CI_COMMIT_SHA}

trivy_fs:
  tags: [ec2-mono]
  needs: ["build-backend", "build-web", "build-execution", "build-feedback"]
  stage: security
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
  script:
    - trivy fs --severity HIGH,CRITICAL .

trivy_config:
  tags: [ec2-mono]
  needs: ["build-backend", "build-web", "build-execution", "build-feedback"]
  stage: security
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
  script:
    - trivy config .

########################
# DEPLOY (EC2에서 docker pull & compose up)
########################
.deploy-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

# (선택) foundation은 infra가 자주 바뀌지 않으면 manual로 두는 걸 추천
deploy-foundation:
  needs: ["build-execution", "build-feedback"]   # db는 공식 이미지라 빌드 불필요, execution & feedback만 필요
  extends: .deploy-template
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH protected=$CI_COMMIT_REF_PROTECTED"
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_foundation.sh"
  rules:
    # develop/main/hotfix에서만 띄우되, 자주 안 건드리면 manual 추천
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

deploy-dev:
  needs: ["build-backend", "build-web", "build-execution", "build-feedback"]
  extends: .deploy-template
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH protected=$CI_COMMIT_REF_PROTECTED"
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  needs: ["build-backend", "build-web", "build-execution", "build-feedback"]
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

########################
# ROLLBACK (manual)
########################
.rollback-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

rollback-dev:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh dev"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: true

rollback-prod:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

rollback-foundation:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh foundation"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

########################
# INFERENCE STAGE
########################
inference-deploy:
  stage: inference
  tags: [elice-container]
  variables:
    GIT_STRATEGY: "none"
    INF_DIR: "inference"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - inference/**
  script:
    - echo "Deploying inference service..."
    - echo "branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

    - rm -rf repo
    - mkdir -p repo
    - cd repo

    - git init
    - git remote add origin "$CI_REPOSITORY_URL"
    - git fetch --depth 1 origin "$CI_COMMIT_SHA"

    - git sparse-checkout init --cone
    - git sparse-checkout set "$INF_DIR"
    - git checkout -f FETCH_HEAD

    - ls -la
    - ls -la "$INF_DIR"

    - rsync -a --delete "$INF_DIR/" /srv/app/

    - pip install -r /srv/app/requirements.txt