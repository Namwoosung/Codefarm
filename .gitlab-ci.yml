stages:
  - build
  - test
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
      when: always

variables:
  IMAGE_TAG: "$CI_COMMIT_SHA"

default:
  before_script:
    - echo "branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# BUILD (docker build & push)
.build-template:
  stage: build
  before_script:
    - echo "branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build-backend:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA" -f backend/Dockerfile backend
    - docker push "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'

build-web:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA" -f infra/nginx/Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'

build-execution:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA" -f execution/Dockerfile execution
    - docker push "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'

build-sandbox:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/sandbox:$CI_COMMIT_SHA" -f execution/python/Dockerfile execution/runner/python
    - docker push "$DOCKERHUB_USERNAME/sandbox:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'

# TEST
test-fast:
  tags: 
    - ec2-mono
  stage: test
  script:
    - echo "Fast tests for feature/infra/fix"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|infra|fix)\/.+/'

test-full:
  tags:
    - ec2-mono
  stage: test
  script:
    - echo "Full tests for develop/main/hotfix"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'


# DEPLOY (EC2에서 docker pull & compose up)
.deploy-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

deploy-dev:
  needs: ["build-backend", "build-web", "build-execution"]
  extends: .deploy-template
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH protected=$CI_COMMIT_REF_PROTECTED"
    - echo "token_set=$([ -n "${DOCKERHUB_TOKEN:-}" ] && echo yes || echo no)"
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app-dev/infra/scripts/deploy.sh dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app-prod/infra/scripts/deploy.sh prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

# ROLLBACK (manual)
.rollback-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

rollback-dev:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app-dev/infra/scripts/rollback.sh dev"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: true

rollback-prod:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app-prod/infra/scripts/rollback.sh prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true