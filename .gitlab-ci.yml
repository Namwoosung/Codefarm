stages:
  - build
  - test
  - security
  - deploy
  - inference

workflow:
  rules:
    # MR 파이프라인도 항상 생성 (CI_COMMIT_BRANCH 비어있는 케이스 방지)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    # 일반 브랜치(push) 파이프라인
    - if: '$CI_COMMIT_BRANCH'
      when: always
    - when: never

variables:
  IMAGE_TAG: "$CI_COMMIT_SHA"

default:
  before_script:
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

########################
# BUILD (docker build & push)
########################
.build-template:
  stage: build
  before_script:
    - echo "branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"
    - docker info
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

build-backend:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA" -f backend/Dockerfile backend
    - docker push "$DOCKERHUB_USERNAME/backend:$CI_COMMIT_SHA"
  rules:
    # MR에서도 빌드가 필요하면(검증 목적) 돌아가게
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - backend/**
        - .gitlab-ci.yml

build-web:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA" -f infra/nginx/Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/web:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - frontend/**
        - infra/nginx/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - frontend/**
        - infra/nginx/**
        - .gitlab-ci.yml

build-execution:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA" -f execution/Dockerfile execution
    - docker push "$DOCKERHUB_USERNAME/execution:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - execution/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - execution/**
        - .gitlab-ci.yml

build-feedback:
  extends: .build-template
  script:
    - docker build -t "$DOCKERHUB_USERNAME/feedback:$CI_COMMIT_SHA" -f feedback/Dockerfile feedback
    - docker push "$DOCKERHUB_USERNAME/feedback:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - feedback/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - feedback/**
        - .gitlab-ci.yml

########################
# TEST
########################
test-fast:
  tags: [ec2-mono]
  stage: test
  script:
    - echo "Fast tests for feature/infra/fix"
  rules:
    # MR 파이프라인에서도 변경 있으면 테스트
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|infra|fix)\/.+/'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml

test-full:
  tags: [ec2-mono]
  stage: test
  script:
    - echo "Full tests for develop/main/hotfix"
  rules:
    # MR에서도 필요하면 full test (원치 않으면 이 블록 제거)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml

########################
# SECURITY SCAN
########################
cache:
  key: trivy-cache
  paths:
    - .trivycache/

trivy_scan_images:
  stage: security
  tags: [ec2-mono]
  needs:
    - job: build-backend
      optional: true
    - job: build-web
      optional: true
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true
  variables:
    TRIVY_SEVERITY: "CRITICAL,HIGH"
  rules:
    # MR에서는 스캔은 하되 실패로 막지 않게(원치 않으면 삭제)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
      variables:
        TRIVY_EXIT_CODE: "0"
    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
      variables:
        TRIVY_EXIT_CODE: "0"   # develop은 발견돼도 통과
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
      variables:
        TRIVY_EXIT_CODE: "0"   # 운영은 차단 <- 임시 패스
  script:
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code ${TRIVY_EXIT_CODE:-0} ${DOCKERHUB_USERNAME}/backend:${CI_COMMIT_SHA} || true
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code ${TRIVY_EXIT_CODE:-0} ${DOCKERHUB_USERNAME}/web:${CI_COMMIT_SHA} || true
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code ${TRIVY_EXIT_CODE:-0} ${DOCKERHUB_USERNAME}/execution:${CI_COMMIT_SHA} || true
    - trivy image --scanners vuln --severity $TRIVY_SEVERITY --exit-code ${TRIVY_EXIT_CODE:-0} ${DOCKERHUB_USERNAME}/feedback:${CI_COMMIT_SHA} || true

trivy_fs:
  stage: security
  tags: [ec2-mono]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
  script:
    - trivy fs --severity HIGH,CRITICAL .

trivy_config:
  stage: security
  tags: [ec2-mono]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml
  script:
    - trivy config .

########################
# DEPLOY (EC2에서 docker pull & compose up)
########################
.deploy-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

deploy-foundation:
  needs:
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true
  extends: .deploy-template
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH protected=$CI_COMMIT_REF_PROTECTED"
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_foundation.sh"
  rules:
    # deploy는 MR에서 돌지 않게(절대)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

deploy-dev:
  needs:
    - job: build-backend
      optional: true
    - job: build-web
      optional: true
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true
  extends: .deploy-template
  script:
    - echo "CI_PIPELINE_SOURCE=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH protected=$CI_COMMIT_REF_PROTECTED"
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      changes:
        - backend/**
        - frontend/**
        - infra/**
        - execution/**
        - feedback/**
        - .gitlab-ci.yml

deploy-prod:
  needs:
    - job: build-backend
      optional: true
    - job: build-web
      optional: true
    - job: build-execution
      optional: true
    - job: build-feedback
      optional: true
  extends: .deploy-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' IMAGE_TAG='$CI_COMMIT_SHA' bash /srv/app/scripts/deploy_server.sh prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

########################
# ROLLBACK (manual)
########################
.rollback-template:
  stage: deploy
  before_script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts

rollback-dev:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: true

rollback-prod:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

rollback-foundation:
  extends: .rollback-template
  script:
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' bash /srv/app/scripts/rollback.sh foundation"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: true

########################
# INFERENCE STAGE
########################
inference-deploy:
  stage: inference
  tags: [elice-container]
  variables:
    GIT_STRATEGY: "none"
    INF_DIR: "inference"
    DEPLOY_DIR: "/srv/app/app/inference"
    MODEL_DIR: "/home/elicer/models"
  rules:
    # MR에서는 배포 금지
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      changes:
        - inference/**
        - .gitlab-ci.yml
  script:
    - set -euo pipefail

    - echo "Deploying inference service..."
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

    # 1) Clean working dir
    - rm -rf repo
    - mkdir -p repo
    - cd repo

    # 2) Sparse checkout only inference/
    - git init
    - git remote add origin "$CI_REPOSITORY_URL"
    - git fetch --depth 1 origin "$CI_COMMIT_SHA"
    - git sparse-checkout init --cone
    - git sparse-checkout set "$INF_DIR"
    - git checkout -f FETCH_HEAD

    # 3) Stage copy to /tmp first (avoid "file has vanished" due to cleanup)
    - STAGE_DIR="/tmp/inference_stage_${CI_PIPELINE_ID}_${CI_JOB_ID}"
    - rm -rf "$STAGE_DIR"
    - mkdir -p "$STAGE_DIR"
    - cp -a "$INF_DIR/." "$STAGE_DIR/"

    # 4) Deploy with rsync
    - mkdir -p "$DEPLOY_DIR"
    - rsync -a --delete --ignore-missing-args --exclude='__pycache__/' --exclude='*.pyc' "$STAGE_DIR/" "$DEPLOY_DIR/" || { rc=$?; [ "$rc" -eq 24 ] && echo "rsync warning(code 24) ignored" && exit 0; exit "$rc"; }

    # 5) Python env + deps
    - cd "$DEPLOY_DIR"
    - export PYENV_ROOT="$HOME/.pyenv"
    - export PATH="$PYENV_ROOT/bin:$PATH"
    - eval "$(pyenv init -)"
    - pyenv activate venv
    - python -V
    - pip install --upgrade pip
    - pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cu128

    # 6) Models
    - echo "Unzipping models..."
    - echo "MODEL_DIR=$MODEL_DIR"
    - ls -al "$MODEL_DIR" || true
    - test -f "$MODEL_DIR/label_model.zip" || { echo "❌ missing: $MODEL_DIR/label_model.zip"; exit 1; }
    - test -f "$MODEL_DIR/text_model.zip"  || { echo "❌ missing: $MODEL_DIR/text_model.zip";  exit 1; }
    - mkdir -p "$DEPLOY_DIR/models/label_model" "$DEPLOY_DIR/models/text_model"
    - unzip -q "$MODEL_DIR/label_model.zip" -d "$DEPLOY_DIR/models/label_model"
    - unzip -q "$MODEL_DIR/text_model.zip"  -d "$DEPLOY_DIR/models/text_model"
