stages:
    - build
    - test
    - deploy

build:
    stage: build
    script:
        - echo "Build"
    rules:
        - if: '$CI_COMMIT_BRANCH'

test:
    stage: test
    script:
        - echo "Test"
    rules:
        - if: '$CI_COMMIT_BRANCH'

deploy-dev:
    stage: deploy
    tags:
        - ec2-dev
    script:
        - echo "Deploy to dev"
        - echo "$DEV_SSH_KEY" | tr -d '\r' > dev.key
        - chmod 600 dev.key
        - ssh -i dev.key $DEV_USER@$DEV_HOST "cd /home/deploy/app && git pull"
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop"'