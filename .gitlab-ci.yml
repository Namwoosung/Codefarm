stages:
    - build
    - test
    - deploy

build:
    stage: build
    script:
        - echo "Build"
    rules:
        - if: '$CI_COMMIT_BRANCH'

test:
    stage: test
    script:
        - echo "Test"
    rules:
        - if: '$CI_COMMIT_BRANCH'

deploy-dev:
    stage: deploy
    tags:
        - ec2-dev
    script:
        - echo "Deploy to dev"
        - mkdir -p ~/.ssh
        - ssh-keyscan $DEV_HOST >> ~/.ssh/known_hosts
        - echo "$DEV_SSH_KEY" | base64 -d > dev.pem
        - chmod 600 dev.pem
        - ssh -i dev.pem $DEV_USER@$DEV_HOST "cd /home/deploy/app && git pull"
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop"'