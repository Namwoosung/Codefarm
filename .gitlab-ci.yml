stages:
  - build
  - test
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
      when: always

default:
  before_script:
    - echo "branch=$CI_COMMIT_BRANCH sha=$CI_COMMIT_SHA"

# -----------------------
# BUILD
# -----------------------
build:
  stage: build
  script:
    - echo "Build"
  rules:
    - if: '$CI_COMMIT_BRANCH'

# -----------------------
# TEST
# -----------------------
test-fast:
  stage: test
  script:
    - echo "Fast tests for feature/infra/fix"
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(feature|infra|fix)\/.+/'

test-full:
  stage: test
  script:
    - echo "Full tests for develop/main/hotfix"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'

# -----------------------
# DEPLOY
# -----------------------
deploy-dev:
  stage: deploy
  script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "bash /srv/app-dev/infra/scripts/deploy-dev.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

deploy-prod:
  stage: deploy
  script:
    - mkdir -p ~/.ssh
    - ssh-keyscan "$HOST" >> ~/.ssh/known_hosts
    - chmod 600 "$SSH_KEY"
    - ssh -i "$SSH_KEY" "$USER@$HOST" "bash /srv/app-prod/infra/scripts/deploy-prod.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^hotfix\/.+/'
      when: manual
      allow_failure: false
