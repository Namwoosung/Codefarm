############################
# HTTP (80) → HTTPS redirect
############################
server {
  listen 80;
  listen [::]:80;
  server_name i14b109.p.ssafy.io;

  # certbot 인증용 (HTTP-01)
  location ^~ /.well-known/acme-challenge/ {
    root /usr/share/nginx/html;
  }

  # 나머지는 전부 HTTPS로 리다이렉트
  location / {
    return 301 https://$host$request_uri;
  }
}

############################
# HTTPS (443) - main service
############################
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name i14b109.p.ssafy.io;

  # SSL 인증서 (Let's Encrypt)
  ssl_certificate     /etc/letsencrypt/live/i14b109.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14b109.p.ssafy.io/privkey.pem;

  # (권장) 기본 SSL 옵션
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Frontend (Vue build 결과)
  root /usr/share/nginx/html;
  index index.html;

  # certbot 갱신 대비 (HTTPS에서도 열어둠)
  location ^~ /.well-known/acme-challenge/ {
    root /usr/share/nginx/html;
  }

  # SPA 라우팅 대응
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API 프록시
  location /api/v1/ {
    proxy_pass http://api:8080/api/v1/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}