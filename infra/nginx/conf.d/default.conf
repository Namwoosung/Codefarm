############################
# HTTP (80) → HTTPS redirect
############################
server {
  listen 80;
  listen [::]:80;
  server_name i14b109.p.ssafy.io;

  # certbot HTTP-01 인증용
  # host: /var/www/certbot
  # container: /var/www/certbot (volume mount)
  location ^~ /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
    try_files $uri =404;
  }

  # 그 외 모든 요청은 HTTPS로 리다이렉트
  location / {
    return 301 https://$host$request_uri;
  }
}

############################
# HTTPS (443) - main service
############################
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name i14b109.p.ssafy.io;

  # Let's Encrypt 인증서
  ssl_certificate     /etc/letsencrypt/live/i14b109.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14b109.p.ssafy.io/privkey.pem;

  # 권장 SSL 설정
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Frontend (Vue build 결과)
  root /usr/share/nginx/html;
  index index.html;

  # HTTPS에서도 certbot 갱신 가능하게 유지
  location ^~ /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
    try_files $uri =404;
  }

  # SPA 라우팅 대응
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API 프록시
  location /api/v1/ {
    proxy_pass http://api:8080/api/v1/;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE(hints/subscribe) 등 지속 연결 지원
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}