############################
# HTTP (80) → HTTPS redirect
############################
server {
  listen 80;
  listen [::]:80;
  server_name i14b109.p.ssafy.io;

  # certbot 인증용 (HTTP-01)
  location ^~ /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

############################
# HTTPS (443) - main service
############################
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name i14b109.p.ssafy.io;

  ssl_certificate     /etc/letsencrypt/live/i14b109.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14b109.p.ssafy.io/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 20m;

  root /usr/share/nginx/html;
  index index.html;

  # certbot 인증용 (HTTPS에서도 필요하면 유지)
  location ^~ /.well-known/acme-challenge/ {
    alias /var/www/certbot/.well-known/acme-challenge/;
    try_files $uri =404;
  }

  location /api/v1/reports/feedback {
    proxy_pass http://feedback:8089;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  ########################################
  # SSE 전용 (가장 중요)
  # - 버퍼링/캐시 끄기
  # - Connection/Upgrade 헤더 제거 (SSE는 websocket 아님)
  ########################################
  location ~* ^/api/v1/sessions/[^/]+/hints/subscribe$ {
    proxy_pass http://api:8080;

    proxy_http_version 1.1;

    # SSE는 업그레이드 연결이 아님 → 제거
    proxy_set_header Upgrade "";
    proxy_set_header Connection keep-alive;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 핵심: 스트리밍이 즉시 흘러가도록
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;

    # 연결 유지(필요시 더 늘려도 됨)
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # (권장) nginx 자체 버퍼링 힌트 + 캐시 방지
    add_header X-Accel-Buffering no;
    add_header Cache-Control no-cache;
  }

  ############################
  # Frontend (SPA)
  ############################
  location / {
    try_files $uri $uri/ /index.html;
  }

  ############################
  # API reverse proxy (일반 REST)
  # - 여기서는 WebSocket 헤더를 "기본으로" 안 넣는 걸 권장
  ############################
  location /api/v1/ {
    proxy_pass http://api:8080;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /execute/ {
    proxy_pass http://execution:8088;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}

